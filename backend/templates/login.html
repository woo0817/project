{% extends 'base.html' %}
{% load static %}

{% block title %}청춘로 - 로그인{% endblock %}

{% block extra_head %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 100px auto;
        padding: 50px;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
    }
    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
        text-align: left;
    }
    .auth-form input {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.05);
        background: rgba(255,255,255,0.5);
        font-weight: 600;
    }
    .auth-btn {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        background: var(--primary-gradient);
        color: white;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(45, 244, 192, 0.3);
    }
    .auth-footer {
        margin-top: 30px;
        font-size: 14px;
        color: var(--text-muted);
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-container glass-panel">
    <div style="font-size: 24px; font-weight: 800; color: var(--soft-blue); margin-bottom: 20px;">LOGIN</div>
    <h1 style="font-size: 28px; font-weight: 900; margin-bottom: 10px;">다시 오신 것을 환영합니다</h1>
    <p style="color: var(--text-muted); margin-bottom: 40px;">당신의 맞춤형 로드맵이 기다리고 있습니다.</p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-btn">로그인</button>
    </form>

    <div class="auth-footer">
        아직 회원이 아니신가요? <a href="{% url 'signup' %}" style="color: var(--soft-blue); font-weight: 800;">회원가입 하기</a>
    </div>
</section>
{% endblock %}
