{% extends 'base.html' %}
{% load static %}

{% block title %}청춘로 - 회원가입{% endblock %}

{% block extra_head %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 80px auto;
        padding: 50px;
        text-align: center;
        animation: slideUp 0.8s ease-out;
    }
    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        text-align: left;
    }
    .auth-form p {
        margin-bottom: 10px;
    }
    .auth-form input {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.05);
        background: rgba(255,255,255,0.5);
        font-weight: 600;
    }
    .auth-btn {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        background: var(--primary-gradient);
        color: white;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(45, 244, 192, 0.3);
        margin-top: 20px;
    }
    .auth-footer {
        margin-top: 30px;
        font-size: 14px;
        color: var(--text-muted);
    }
    .helptext {
        font-size: 11px;
        color: var(--text-muted);
        display: block;
        margin-top: 4px;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-container glass-panel">
    <div style="font-size: 24px; font-weight: 800; color: var(--soft-blue); margin-bottom: 20px;">SAFE</div>
    <h1 style="font-size: 28px; font-weight: 900; margin-bottom: 10px;">청춘로의 일원이 되어보세요</h1>
    <p style="color: var(--text-muted); margin-bottom: 40px;">당신만을 위한 지능형 리포트 보관함이 준비됩니다.</p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-btn">회원가입 완료</button>
    </form>

    <div class="auth-footer">
        이미 회원이신가요? <a href="{% url 'login' %}" style="color: var(--soft-blue); font-weight: 800;">로그인 하러가기</a>
    </div>
</section>
{% endblock %}
