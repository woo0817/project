<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 정책 비서{% endblock %}</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #2df4c0 0%, #2563eb 100%);
            --soft-blue: #2563eb;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: #f8fafc;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 20px; font-weight: 900; color: white;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
        }
        .nav-link {
            color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 600;
            padding: 8px 16px; border-radius: 8px; transition: all 0.2s;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-btn {
            background: var(--primary-gradient); color: white;
            border: none; padding: 10px 24px; border-radius: 50px;
            font-weight: 800; text-decoration: none; transition: transform 0.2s;
        }
        .nav-btn:hover { transform: scale(1.05); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .alert { padding: 12px 20px; background: #dcfce7; color: #166534; border-radius: 8px; margin-bottom: 20px; font-size: 14px; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>
    <header class="header">
        <a href="{% url 'index' %}" class="logo">
            <span style="font-size: 24px;">🏛️</span>
            <span>청춘로(路) <span style="font-weight: 400; font-size: 14px; opacity: 0.6;">AI LAB</span></span>
        </a>
        <nav style="display: flex; gap: 15px; align-items: center;">
            <a href="{% url 'index' %}" class="nav-link">Main</a>
            {% if user.is_authenticated %}
                <span style="color: white; font-size: 13px; font-weight: 700; opacity: 0.8;">{{ user.username }}님 환영합니다</span>
                <a href="{% url 'logout' %}" class="nav-link">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link">Login</a>
                <a href="{% url 'signup' %}" class="nav-btn">Signup</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
