{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 60px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;">
    <h2 style="margin-top: 0; margin-bottom: 25px; color: #1e293b; text-align: center; font-weight: 800;">회원가입</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">{{ field.label }}</label>
            <div class="input-wrapper">
                {{ field }}
            </div>
            {% if field.help_text %}
            <p style="font-size: 11px; color: #94a3b8; margin-top: 5px; line-height: 1.4;">{{ field.help_text }}</p>
            {% endif %}
            {% for error in field.errors %}
            <p style="color: #ef4444; font-size: 12px; margin-top: 5px; font-weight: 600;">⚠️ {{ error }}</p>
            {% endfor %}
        </div>
        {% endfor %}
        <button type="submit" style="width: 100%; padding: 14px; background: var(--primary-gradient); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px;">시작하기</button>
    </form>
    <p style="margin-top: 25px; text-align: center; font-size: 14px; color: #64748b;">
        이미 계정이 있으신가요? <a href="{% url 'login' %}" style="color: #2563eb; font-weight: 700; text-decoration: none;">로그인</a>
    </p>
</div>
<style>
    .input-wrapper input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
    .input-wrapper input:focus { border-color: var(--soft-blue); }
</style>
{% endblock %}
