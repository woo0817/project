{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;">
    <h2 style="margin-top: 0; margin-bottom: 25px; color: #1e293b; text-align: center; font-weight: 800;">로그인</h2>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">아이디</label>
            <input type="text" name="username" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; outline: none;" placeholder="아이디를 입력하세요">
        </div>
        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">비밀번호</label>
            <input type="password" name="password" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; outline: none;" placeholder="••••••••">
        </div>
        <button type="submit" style="width: 100%; padding: 14px; background: var(--primary-gradient); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 16px;">로그인하기</button>
    </form>
    <p style="margin-top: 25px; text-align: center; font-size: 14px; color: #64748b;">
        처음이신가요? <a href="{% url 'signup' %}" style="color: #2563eb; font-weight: 700; text-decoration: none;">회원가입</a>
    </p>
</div>
{% endblock %}
